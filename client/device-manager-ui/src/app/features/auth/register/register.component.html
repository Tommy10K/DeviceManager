<section class="auth-page">
  <form [formGroup]="form" (ngSubmit)="register()" class="auth-form">
    <mat-form-field appearance="outline">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error *ngIf="form.controls.name.touched && form.controls.name.hasError('required')">
        Name is required.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
      <mat-error *ngIf="form.controls.email.touched && form.controls.email.hasError('required')">
        Email is required.
      </mat-error>
      <mat-error *ngIf="form.controls.email.touched && form.controls.email.hasError('email')">
        Enter a valid email.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-error *ngIf="form.controls.password.touched && form.controls.password.hasError('required')">
        Password is required.
      </mat-error>
      <mat-error *ngIf="form.controls.password.touched && form.controls.password.hasError('minlength')">
        Password must be at least 6 characters.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Location</mat-label>
      <input matInput formControlName="location" />
      <mat-error *ngIf="form.controls.location.touched && form.controls.location.hasError('required')">
        Location is required.
      </mat-error>
    </mat-form-field>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || isSubmitting">
      Register
    </button>
  </form>

  <p class="auth-link">
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>
</section>
