<div class="app-shell">
	<mat-toolbar color="primary" class="top-toolbar">
		<a class="brand" routerLink="/devices">Device Manager</a>
		<span class="spacer"></span>
		<span class="user-name" *ngIf="isLoggedIn">{{ currentUserName }}</span>
		<span class="role-chip" *ngIf="isLoggedIn">{{ currentUserRole }}</span>
	</mat-toolbar>

	<nav class="main-nav" aria-label="Primary navigation">
		<ng-container *ngIf="isLoggedIn; else loggedOutMenu">
			<a mat-button routerLink="/devices" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
				Devices
			</a>
			<a mat-button routerLink="/devices/new" routerLinkActive="active-link" *ngIf="isAdmin">
				Add Device
			</a>
			<button mat-button type="button" (click)="logout()">Logout</button>
		</ng-container>

		<ng-template #loggedOutMenu>
			<a mat-button routerLink="/login" routerLinkActive="active-link">Login</a>
			<a mat-button routerLink="/register" routerLinkActive="active-link">Register</a>
		</ng-template>
	</nav>

	<main class="page-content">
		<section class="api-error-banner" *ngIf="(apiError$ | async) as apiError">
			<span>{{ apiError }}</span>
			<button mat-button type="button" (click)="dismissApiError()">Dismiss</button>
		</section>

		<h1 class="route-title">{{ pageTitle }}</h1>

		<router-outlet></router-outlet>
	</main>

	<footer class="app-footer">Device Manager demo application</footer>
</div>
